<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plain Text Clock In/Out System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: #000;
            color: #0f0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            border: 2px solid #0f0;
            padding: 20px;
            background-color: #111;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #0f0;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .timestamp {
            font-size: 12px;
            opacity: 0.7;
        }

        .section {
            margin-bottom: 20px;
            border: 1px solid #0f0;
            padding: 15px;
            background-color: #0a0a0a;
        }

        .section-title {
            font-weight: bold;
            border-bottom: 1px solid #0f0;
            padding-bottom: 8px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .status-display {
            margin-bottom: 15px;
        }

        .status-line {
            margin: 8px 0;
        }

        .label {
            font-weight: bold;
            display: inline-block;
            width: 180px;
        }

        .value {
            color: #0f0;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        button {
            flex: 1;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            background-color: #000;
            color: #0f0;
            border: 2px solid #0f0;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background-color: #0f0;
            color: #000;
        }

        button:active {
            transform: scale(0.98);
        }

        .button-in {
            border-color: #0f0;
        }

        .button-out {
            border-color: #f00;
            color: #f00;
        }

        .button-out:hover {
            background-color: #f00;
            color: #000;
        }

        .log-container {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #0f0;
            padding: 10px;
            background-color: #000;
            margin: 10px 0;
        }

        .log-entry {
            margin: 8px 0;
            padding: 5px;
            border-left: 2px solid #0f0;
            padding-left: 10px;
            font-size: 13px;
        }

        .log-entry.in {
            border-left-color: #0f0;
        }

        .log-entry.out {
            border-left-color: #f00;
            color: #f00;
        }

        .action-badge {
            font-weight: bold;
            margin: 0 5px;
        }

        .last-user-section {
            margin-top: 20px;
            border: 2px solid #0f0;
            padding: 15px;
            text-align: center;
            background-color: #0a0a0a;
        }

        .last-user-label {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 8px;
        }

        .last-user-name {
            font-size: 20px;
            font-weight: bold;
            color: #0f0;
        }

        .empty-message {
            color: #666;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }

        .divider {
            border-top: 1px solid #0f0;
            margin: 15px 0;
            opacity: 0.5;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #0f0;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #0f0;
            opacity: 0.8;
        }

        .hours-worked {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #0f0;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }

            .label {
                display: block;
                margin-bottom: 5px;
                width: 100%;
            }

            button {
                padding: 10px;
                font-size: 12px;
            }

            .title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">>> CLOCK IN/OUT SYSTEM <<</div>
            <div class="timestamp" id="headerTime">Loading...</div>
        </div>

        <div class="section">
            <div class="section-title">System Status</div>
            <div class="status-display">
                <div class="status-line">
                    <span class="label">Current Status:</span>
                    <span class="value" id="status">NOT CLOCKED IN</span>
                </div>
                <div class="status-line">
                    <span class="label">Clock In Time:</span>
                    <span class="value" id="clockInDisplay">--:--:--</span>
                </div>
                <div class="status-line">
                    <span class="label">Clock Out Time:</span>
                    <span class="value" id="clockOutDisplay">--:--:--</span>
                </div>
                <div class="status-line hours-worked">
                    <span class="label">Hours Worked:</span>
                    <span class="value" id="hoursWorked">0h 0m 0s</span>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button class="button-in" onclick="clockIn()">[ CLOCK IN ]</button>
            <button class="button-out" onclick="clockOut()">[ CLOCK OUT ]</button>
        </div>

        <div class="section">
            <div class="section-title">Activity Log</div>
            <div class="log-container" id="logContainer">
                <div class="empty-message">--- No Activity Yet ---</div>
            </div>
        </div>

        <div class="last-user-section">
            <div class="last-user-label">> Last User Visited</div>
            <div class="last-user-name" id="lastUserDisplay">NONE</div>
        </div>

        <div style="text-align: center; margin-top: 20px; opacity: 0.5; font-size: 12px;">
            [END OF SYSTEM STATUS]
        </div>
    </div>

    <script>
        // Data storage
        let logs = JSON.parse(localStorage.getItem('plainTextClockLogs')) || [];
        let isClockedIn = false;
        let clockInTime = null;
        let clockInDate = null;

        // Format date to YYYY-MM-DD
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // Format time to HH:MM:SS
        function formatTime(date) {
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${hours}:${minutes}:${seconds}`;
        }

        // Update header time
        function updateHeaderTime() {
            const now = new Date();
            const dateStr = formatDate(now);
            const timeStr = formatTime(now);
            document.getElementById('headerTime').textContent = `${dateStr} ${timeStr}`;
        }

        // Clock In
        function clockIn() {
            if (isClockedIn) {
                alert('>>> ERROR: Already clocked in! Clock out first. <<<');
                return;
            }

            const now = new Date();
            clockInTime = now;
            clockInDate = formatDate(now);
            isClockedIn = true;

            const entry = {
                date: formatDate(now),
                time: formatTime(now),
                action: 'CLOCK IN'
            };

            logs.push(entry);
            localStorage.setItem('plainTextClockLogs', JSON.stringify(logs));

            updateDisplay();
            updateLog();
        }

        // Clock Out
        function clockOut() {
            if (!isClockedIn) {
                alert('>>> ERROR: Not clocked in! Clock in first. <<<');
                return;
            }

            const now = new Date();
            isClockedIn = false;

            const entry = {
                date: formatDate(now),
                time: formatTime(now),
                action: 'CLOCK OUT'
            };

            logs.push(entry);
            localStorage.setItem('plainTextClockLogs', JSON.stringify(logs));

            calculateHoursWorked(clockInTime, now);
            updateDisplay();
            updateLog();
        }

        // Calculate hours worked
        function calculateHoursWorked(clockInDateTime, clockOutDateTime) {
            const diff = clockOutDateTime - clockInDateTime;
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('hoursWorked').textContent = `${hours}h ${minutes}m ${seconds}s`;
        }

        // Update display
        function updateDisplay() {
            if (isClockedIn) {
                document.getElementById('status').textContent = 'CLOCKED IN';
                document.getElementById('clockInDisplay').textContent = formatTime(clockInTime);
                document.getElementById('clockOutDisplay').textContent = '--:--:--';
            } else {
                document.getElementById('status').textContent = 'CLOCKED OUT';
                if (logs.length > 0) {
                    const lastEntry = logs[logs.length - 1];
                    if (lastEntry.action === 'CLOCK OUT') {
                        document.getElementById('clockOutDisplay').textContent = lastEntry.time;
                    }
                }
            }
        }

        // Update activity log
        function updateLog() {
            const logContainer = document.getElementById('logContainer');

            if (logs.length === 0) {
                logContainer.innerHTML = '<div class="empty-message">--- No Activity Yet ---</div>';
                document.getElementById('lastUserDisplay').textContent = 'NONE';
                return;
            }

            // Create log entries
            logContainer.innerHTML = logs.map((log, index) => {
                const entryClass = log.action === 'CLOCK IN' ? 'in' : 'out';
                const actionText = log.action === 'CLOCK IN' ? '[IN]' : '[OUT]';
                return `
                    <div class="log-entry ${entryClass}">
                        ${log.date} ${log.time} ${actionText}
                    </div>
                `;
            }).reverse().join('');

            // Update last user (using index 0 or 1 based on current session)
            const lastUser = logs.length > 0 ? `USER_${String(logs.length).padStart(3, '0')}` : 'NONE';
            document.getElementById('lastUserDisplay').textContent = lastUser;
        }

        // Initialize
        updateHeaderTime();
        updateDisplay();
        updateLog();

        // Update time every second
        setInterval(updateHeaderTime, 1000);
    </script>
</body>
</html>
